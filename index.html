<!DOCTYPE html>

  <title>Family Trip Okinawa 2026</title>
  
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="沖繩2026">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {},
      }
    }
  </script>
  <style>
    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .animate-slide-up { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

    /* 可愛果凍彈跳動畫 */
    @keyframes popIn {
      0% { transform: scale(0.9); opacity: 0; }
      70% { transform: scale(1.02); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }
    .animate-pop-in { animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
  </style>
</head>
<body class="bg-[#F9F6F0] font-sans text-[#4A3B32] selection:bg-[#E6DFD3]">

  <div id="root" class="min-h-screen max-w-md mx-auto relative shadow-xl overflow-hidden bg-[#F9F6F0] flex flex-col">
    
    <header class="fixed top-0 w-full max-w-md z-40 bg-[#F9F6F0]/90 backdrop-blur-md border-b border-[#E6DFD3] px-4 pt-4 pb-2 h-[60px] flex flex-col items-center justify-center shadow-sm">
      <h1 class="text-lg font-bold tracking-widest text-[#4A3B32] leading-none">FAMILY TRIP</h1>
      <p class="text-[9px] font-medium text-[#8B7D73] tracking-widest mt-1 leading-none">OKINAWA 2026.06</p>
    </header>

    <main id="main-content" class="flex-1 overflow-y-auto h-full"></main>

    <nav id="bottom-nav" class="fixed bottom-0 w-full max-w-md bg-[#FDFBF7] border-t border-[#E6DFD3] pb-safe pt-2 px-6 flex justify-between items-center z-40"></nav>

    <div id="modals-container"></div>
  </div>

  <script>
    // --- 應用程式狀態 (Global States) ---
    let activeTab = 'dashboard';
    let dashboardMode = 'entry'; 
    let selectedDay = 'Day 1';
    let activeListTab = 'luggage'; 
    
    let showFlightInfo = false;
    let showDeclaration = false;
    let showEmergency = false;
    let previewPdf = null;
    let agreedDeclarations = [];

    // --- 資料 (Data) ---
    const scheduleData = [
      {
        day: 'Day 1', date: '06/04',
        events: [
          { title: '台中機場出發', desc: '集合辦理登機，準備出發！', highlight: '記得帶護照', highlightType: 'notice' },
          { title: '那霸機場抵達', desc: '辦理入境、提領行李', nav: 'Naha Airport' },
          { title: 'Izakaya Ran', desc: '第一晚的日式居酒屋宵夜/晚餐', highlight: '必吃美食', highlightType: 'food', nav: 'Izakaya Ran Okinawa', guide: '抵達第一晚的放鬆好去處，體驗最道地的沖繩居酒屋熱鬧氛圍與串燒。' },
          { title: '大和Roynet飯店PREMIER', desc: '辦理 Check-in，好好休息', highlight: 'Day 1 住宿', highlightType: 'reservation', nav: 'Daiwa Roynet Hotel Naha Omoromachi PREMIER' }
        ]
      },
      {
        day: 'Day 2', date: '06/05',
        events: [
          { title: 'DFS 沖繩那霸店 取車', desc: '至 Toyota T廣場(TGALLERIA)2樓 櫃檯辦理租車', highlight: '備妥駕照與日文譯本', highlightType: 'notice', nav: 'T Galleria by DFS, Okinawa', guide: '沖繩唯一路面免稅店，取車之餘可順便逛逛精品或購買美妝。' },
          { title: '泊港漁市場', desc: '享受新鮮海產與生魚片', highlight: '必吃: 新鮮海鮮生蠔', highlightType: 'food', nav: 'Tomariiyumachi', guide: '那霸市內最大的海鮮批發市場！推薦找可以現殺現吃的攤位，大啖黑鮪魚與海膽。' },
          { title: 'Gangala之谷', desc: '探索沖繩神秘的大自然洞穴與鐘乳石', highlight: '建議穿好走的鞋', highlightType: 'notice', nav: 'Valley of Gangala', guide: '數十萬年前鐘乳石洞崩塌形成的太古森林，入口處的「洞穴咖啡廳」非常受歡迎，記得拍照！' },
          { title: 'COSTCO好市多 沖繩店', desc: '採購大份量零食與補給品', highlight: '記得帶台灣會員卡', highlightType: 'notice', nav: 'Costco Wholesale Okinawa Nanjo' },
          { title: '迴轉壽司市場 美浜店', desc: '沖繩高人氣排隊迴轉壽司', highlight: '必吃美食', highlightType: 'food', nav: 'Gourmet Kaiten Sushi Ichiba Mihama' },
          { title: '美國村 (American Village)', desc: '漫步夕陽下的異國風情街道', nav: 'American Village Okinawa', guide: '充滿美式復古風情的度假勝地。日落海灘的夕陽絕美，晚上點燈後更是魔幻，適合慢慢散步。' },
          { title: '北谷海濱公寓', desc: 'Check-in (三天兩夜 Day 1)', highlight: 'Day 2 住宿', highlightType: 'reservation', nav: 'Chatan Seaside Condominium' }
        ]
      },
      {
        day: 'Day 3', date: '06/06',
        events: [
          { title: '珀塔瑪 北谷 美國村店', desc: '超人氣 Pork Tamago 飯糰', highlight: '必吃早餐', highlightType: 'food', nav: 'Pork Tamago Onigiri Chatan', guide: '沖繩靈魂美食！推薦點「明太子美乃滋」或「炸蝦」口味，配上一杯熱湯超滿足。' },
          { title: '瀨底島 (Sesoko Island)', desc: '跨海大橋與絕美透明海灘', nav: 'Sesoko Island', guide: '擁有沖繩本島透明度數一數二的天然海灘，沙質細緻潔白，海水呈現美麗的漸層藍。' },
          { title: 'Agai Okinawa Aburasoba', desc: '美味的沖繩油拌麵', highlight: '必吃美食', highlightType: 'food', nav: 'Agai Okinawa Aburasoba' },
          { title: 'Sinmay Coffee 沖繩', desc: '下午茶與咖啡時光', nav: 'Sinmay Coffee' },
          { title: '古宇利島の駅 ソラハシ', desc: '買伴手禮、遠眺古宇利大橋', nav: 'Kouri Island Station Sorahashi', guide: '位於傳說中「神之島」的入口，可購買特產並在橋頭拍下壯觀的跨海大橋無敵海景。' },
          { title: '萬座毛', desc: '經典象鼻岩與無敵海景', nav: 'Cape Manzamo', guide: '沖繩最著名的自然景觀之一，可容納萬人坐下的廣闊草原與狀似大象鼻子的珊瑚礁懸崖。' },
          { title: 'Ryukyu Beach Club', desc: '海灘俱樂部放鬆時光', nav: 'Ryukyu Beach Club' },
          { title: '浜の家海鮮料理', desc: '澎湃的海鮮定食晚餐', highlight: '必吃: 奶油烤魚', highlightType: 'food', nav: 'Hamanoya Seafood Restaurant', guide: '在地人強推的海鮮老店，招牌「奶油烤魚(黃油烤魚)」香氣四溢，定食份量極大！' },
          { title: '北谷海濱公寓', desc: '返回住宿 (三天兩夜 Day 2)', highlight: 'Day 3 住宿', highlightType: 'reservation' }
        ]
      },
      {
        day: 'Day 4', date: '06/07',
        events: [
          { title: '浜屋沖繩麵', desc: '在地人也愛的軟骨豬肉麵', highlight: '必吃美食', highlightType: 'food', nav: 'Hamaya Soba', guide: '湯頭清爽不油膩，入口即化的軟骨豬肉是招牌，許多潛水客上岸後的最愛。' },
          { title: 'A&W Makiminato', desc: '沖繩限定美式速食', highlight: '必喝: 麥根沙士', highlightType: 'food', nav: 'A&W Makiminato', guide: '只有沖繩才吃得到的連鎖速食店！招牌麥根沙士(Root Beer)內用還可以免費無限續杯。' },
          { title: 'Sports Depo Ameku', desc: '大型運動用品店血拼', nav: 'Sports Depo Ameku' },
          { title: 'SAN-A浦添西海岸 PARCO CITY', desc: '沖繩最大海景購物中心', highlight: '購物聖地', highlightType: 'notice', nav: 'PARCO CITY Okinawa', guide: '擁有無敵海景的超大型購物中心，品牌超齊全，還有阿卡將等婦幼品牌，適合全家血拼。' },
          { title: '瀬長島47STORE', desc: '瀨長島海景與特色選物', nav: 'Umikaji Terrace Senagajima', guide: '號稱沖繩小希臘，純白色的建築依山而建，可近距離觀賞飛機起降，伴手禮店非常好逛。' },
          { title: 'Buchi Kumojiten', desc: '質感特色店鋪逛街', nav: 'Buchi Kumojiten' },
          { title: '國際通', desc: '那霸最熱鬧的購物街', nav: 'Kokusai Dori' },
          { title: 'Hotel Grand Consort 那霸', desc: 'Check-in (三天兩夜 Day 1)', highlight: 'Day 4 住宿', highlightType: 'reservation', nav: 'Hotel Grand Consort Naha' }
        ]
      },
      {
        day: 'Day 5', date: '06/08',
        events: [
          { title: 'DFS 沖繩那霸店 還車', desc: 'Toyota 租車歸還 (15:00前)', highlight: '記得加滿油', highlightType: 'notice', nav: 'T Galleria by DFS, Okinawa' },
          { title: '首里城 (外圍/守禮門)', desc: '琉球王國的歷史象徵', nav: 'Shuri Castle' },
          { title: '西來院 (達磨寺)', desc: '充滿特色的祈福寺廟', nav: 'Daruma-dera Temple Okinawa' },
          { title: '波上宮', desc: '建在懸崖上的沖繩總鎮守', highlight: '可買特色御守', highlightType: 'notice', nav: 'Naminoue Shrine', guide: '建在珊瑚礁懸崖上的神聖神社，是沖繩八社之首。記得買充滿沖繩風格的「紅型御守」保平安。' },
          { title: 'Ryoshi Shokudo Obanburumai Sakana Daitoryo', desc: '超浮誇大份量海鮮食堂', highlight: '必吃美食', highlightType: 'food', nav: 'Ryoshi Shokudo Obanburumai' },
          { title: '國際通', desc: '可以買伴手禮與紀念品', nav: 'Kokusai Dori', guide: '長達1.6公里的奇蹟的一英里。各式特產、紅芋塔、雪鹽都能在這裡一次買齊。' },
          { title: '暫定博多一幸舍 那霸國際通店', desc: '濃郁豚骨拉麵完美收尾', highlight: '必吃美食', highlightType: 'food', nav: 'Hakata Ikkousha Naha' },
          { title: 'Hotel Grand Consort 那霸', desc: '整理行李 (三天兩夜 Day 2)', highlight: 'Day 5 住宿', highlightType: 'reservation' }
        ]
      },
      {
        day: 'Day 6', date: '06/09',
        events: [
          { title: '那霸機場', desc: '辦理報到、最後採買', highlight: '建議提早於 14:15 前抵達', highlightType: 'notice', nav: 'Naha Airport' },
          { title: '滿載而歸', desc: '搭乘星宇航空返回溫暖的家', highlightType: 'reservation' }
        ]
      }
    ];

    const declarationsList = [
      { id: 1, icon: '💣', title: '踩到雷請冷靜', text: '不合胃口別說「這好貴又好難吃」！可以說「很特別的口味，有吃過就好」。' },
      { id: 2, icon: '😮‍💨', title: '累了好好說，臭臉會倒霉', text: '體力不支絕對要說！不撐、不忍、不碎念。' },
      { id: 3, icon: '🙅🏻‍♀️', title: '禁止說「台灣也有」', text: '不管是風景還是食物，一直說「這台灣更多、便宜、為什麼這麼貴？」請馬上盡快游回台灣👋🏻' },
      { id: 4, icon: '🕰️', title: '嚴禁排隊式不耐煩', text: '輕鬆出遊，可以自由選擇～務必先約好時間地點在出發！務必保持聯繫♡' },
      { id: 5, icon: '🚽', title: '廁所不可怕', text: '有廁所就去上，憋不住了才找更可怕！' },
      { id: 6, icon: '🗺️', title: '迷路請當作散步', text: '如果轉錯彎或看錯地圖，不要說「你到底行不行」，請安靜享受沿途美麗風景。' },
      { id: 7, icon: '🙏🏻', title: '平安就好，不碎念抱怨', text: '東西掉了可以再買，車沒搭上可以等下一班，只要全家人都還在就好。' },
      { id: 8, icon: '🏖️', title: '開啟度假模式', text: '稱讚是免費的多說一點；每天請至少說一句「今天很好玩~」。' }
    ];

    // --- 資料預設值 ---
    const defaultLuggage = [
      { id: 1, text: '護照 (效期需大於6個月)', checked: false },
      { id: 2, text: '日幣現金 / 信用卡', checked: false },
      { id: 3, text: '駕照正本 + 日文譯本', checked: false },
      { id: 4, text: '個人常備藥品', checked: false },
      { id: 5, text: '手機充電線 / 行動電源', checked: false }
    ];

    const defaultShopping = [
      { id: 1, text: '紅芋塔、雪鹽', checked: false },
      { id: 2, text: '藥妝清單', checked: false },
      { id: 3, text: '國際通伴手禮', checked: false }
    ];

    // --- 從手機記憶讀取，沒有的話才用預設值 ---
    let luggage = JSON.parse(localStorage.getItem('oki_luggage')) || defaultLuggage;
    let shopping = JSON.parse(localStorage.getItem('oki_shopping')) || defaultShopping;

    // --- 儲存資料到手機記憶 ---
    const saveListData = () => {
      localStorage.setItem('oki_luggage', JSON.stringify(luggage));
      localStorage.setItem('oki_shopping', JSON.stringify(shopping));
    };

    // --- Action Functions ---
    window.setTab = (tab) => { 
      activeTab = tab; 
      renderMain(); 
      renderBottomNav();
      lucide.createIcons();
      window.scrollTo(0, 0);
    };

    window.setDashboardMode = (mode) => { 
      dashboardMode = mode; 
      renderMain(); 
      lucide.createIcons();
    };

    window.setSelectedDay = (day) => { 
      selectedDay = day; 
      renderMain(); 
      lucide.createIcons();
    };

    window.setListTab = (tab) => { 
      activeListTab = tab; 
      renderMain(); 
      lucide.createIcons();
    };

    window.openModal = (modalName) => {
      if(modalName === 'flight') showFlightInfo = true;
      if(modalName === 'declaration') showDeclaration = true;
      if(modalName === 'emergency') showEmergency = true;
      renderModals();
      lucide.createIcons();
    };
    
    window.closeModal = () => {
      showFlightInfo = false;
      showDeclaration = false;
      showEmergency = false;
      previewPdf = null;
      renderModals();
      lucide.createIcons();
    };

    window.openPdf = (pdfId) => { 
      previewPdf = pdfId; 
      renderModals(); 
      lucide.createIcons();
    };

    // --- List Actions (加上記憶儲存功能) ---
    window.toggleListItem = (id) => {
      if (activeListTab === 'luggage') {
        const item = luggage.find(i => String(i.id) === String(id));
        if(item) item.checked = !item.checked;
      } else {
        const item = shopping.find(i => String(i.id) === String(id));
        if(item) item.checked = !item.checked;
      }
      saveListData();
      renderMain();
      lucide.createIcons();
    };

    window.deleteListItem = (id, event) => {
      event.stopPropagation();
      if(activeListTab === 'luggage') {
        luggage = luggage.filter(i => String(i.id) !== String(id));
      } else {
        shopping = shopping.filter(i => String(i.id) !== String(id));
      }
      saveListData();
      renderMain();
      lucide.createIcons();
    };

    window.addListItem = (event) => {
      event.preventDefault();
      const input = document.getElementById('list-input');
      const val = input.value.trim();
      if(!val) return;
      if(activeListTab === 'luggage') {
        luggage.push({ id: Date.now(), text: val, checked: false });
      } else {
        shopping.push({ id: Date.now(), text: val, checked: false });
      }
      saveListData();
      renderMain();
      lucide.createIcons();
    };

    // --- 局部更新 DOM，避免整頁重新渲染導致閃跳 ---
    window.agreeDeclaration = (id) => {
      if(!agreedDeclarations.includes(id)) {
        agreedDeclarations.push(id);
        
        const itemDiv = document.getElementById(`dec-item-${id}`);
        const btn = document.getElementById(`dec-btn-${id}`);
        
        if (itemDiv && btn) {
          itemDiv.className = "relative bg-[#FFF5F5] p-4 rounded-2xl border-2 transition-all duration-300 border-[#FF96A5] shadow-sm transform scale-[0.98]";
          itemDiv.insertAdjacentHTML('afterbegin', '<div class="absolute -top-3 -right-2 text-2xl rotate-12 z-10 drop-shadow-sm animate-pop-in">💮</div>');
          
          btn.className = "w-full py-2 rounded-xl text-xs font-bold transition-all duration-300 bg-[#FF96A5] text-white cursor-default";
          btn.innerHTML = "已打勾勾 🌸";
          btn.disabled = true;
        }

        if(agreedDeclarations.length === declarationsList.length) {
          const submitBtn = document.getElementById('dec-submit-btn');
          if(submitBtn) {
            submitBtn.disabled = false;
            submitBtn.className = "w-full py-3.5 rounded-2xl text-[15px] font-bold shadow-lg transition-all duration-300 flex items-center justify-center bg-[#FF96A5] text-white active:scale-95 shadow-[#FF96A5]/30 border-2 border-[#FF7A8A]";
            submitBtn.innerHTML = "💖 棒！準備出發啦～ 💖";
          }
        }
      }
    };


    // --- Rendering Logic ---
    const renderBottomNav = () => {
      const tabs = [
        { id: 'dashboard', icon: 'plane', label: '首頁' },
        { id: 'schedule', icon: 'calendar', label: '行程' },
        { id: 'bookings', icon: 'file-text', label: '預訂' },
        { id: 'list', icon: 'check-square', label: '清單' }
      ];
      
      const html = tabs.map(tab => `
        <button onclick="setTab('${tab.id}')" class="flex flex-col items-center p-2 transition-colors ${activeTab === tab.id ? 'text-[#D97D54]' : 'text-[#A69A90]'}">
          <i data-lucide="${tab.icon}" class="w-6 h-6" stroke-width="${activeTab === tab.id ? '2.5' : '2'}"></i>
          <span class="text-[10px] mt-1 font-medium">${tab.label}</span>
        </button>
      `).join('');
      
      document.getElementById('bottom-nav').innerHTML = html;
    };

    const getDashboardHtml = () => {
      let content = '';
      if(dashboardMode === 'entry') {
        content = `
          <section>
            <div class="flex overflow-x-auto hide-scrollbar space-x-4 snap-x snap-mandatory -mx-4 px-4 pb-2">
              <div onclick="openModal('flight')" class="bg-[#1C1C1E] rounded-3xl p-5 shadow-lg border border-[#333] text-white flex-shrink-0 w-full snap-center cursor-pointer active:scale-[0.98] transition-transform">
                <div class="flex justify-between items-center border-b border-[#333] pb-3 mb-4">
                  <div class="flex items-center space-x-2">
                    <div class="w-5 h-5 bg-[#C5A880] flex items-center justify-center rounded-sm">
                      <i data-lucide="plane" class="text-[#1C1C1E] transform rotate-45 w-[14px] h-[14px]"></i>
                    </div>
                    <span class="font-bold text-lg tracking-wider text-white">JX312</span>
                  </div>
                  <span class="bg-[#333] px-2 py-1 rounded text-xs font-bold text-[#CCC]">經濟艙</span>
                </div>
                <div class="flex justify-between text-[#888] text-xs mb-1 font-medium">
                  <span>2026年6月4日 週四</span><span>2026年6月4日 週四</span>
                </div>
                <div class="flex justify-between items-center mb-1">
                  <div class="text-3xl font-black tracking-tight text-white">16:40</div>
                  <div class="flex-1 flex flex-col items-center px-2">
                    <span class="text-[10px] text-[#888] tracking-widest">AIRBUS A321NEO</span>

    const getListHtml = () => {

      }

      if (showDeclaration) {
        const isAllAgreed = agreedDeclarations.length === declarationsList.length;
        
        const decHtml = declarationsList.map(dec => `
          <div id="dec-item-${dec.id}" class="relative bg-white p-4 rounded-2xl border-2 transition-all duration-300 ${agreedDeclarations.includes(dec.id) ? 'border-[#FF96A5] shadow-sm transform scale-[0.98] bg-[#FFF5F5]' : 'border-[#F2EBE1] shadow-sm'}">

              <div class="w-[38px] h-[38px] rounded-full bg-[#FFFBF0] flex items-center justify-center text-lg mr-3 flex-shrink-0 border border-[#F2EBE1] shadow-inner">${dec.icon}</div>
              <div>
                <h3 class="font-bold text-[#5C4D43] text-sm">${dec.title}</h3>
                <p class="text-[13px] text-[#736357] mt-1 leading-relaxed">${dec.text}</p>
              </div>
            </div>
            <button id="dec-btn-${dec.id}" onclick="agreeDeclaration(${dec.id})" ${agreedDeclarations.includes(dec.id) ? 'disabled' : ''} class="w-full py-2 rounded-xl text-xs font-bold transition-all duration-300 ${agreedDeclarations.includes(dec.id) ? 'bg-[#FF96A5] text-white cursor-default' : 'bg-[#F9F6F0] text-[#8B7D73] active:bg-[#E6DFD3] active:scale-95 border border-[#E6DFD3] hover:border-[#D97D54]'}">

                    <div class="text-xl font-bold text-[#4A3B32] mb-3">中国語対応の病院はありますか？</div>
                    <div class="text-xs text-[#A69A90] font-medium">(請問有對應中文的醫院嗎？)</div>

    // --- Start App ---
    const renderApp = () => {
      renderMain();
      renderBottomNav();
      renderModals();
      lucide.createIcons();
    };

    document.addEventListener('DOMContentLoaded', () => {

    });

  </script>
